<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>izapple2 - Apple II Emulator</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 1;
      }
      /* Override Ebiten's canvas positioning - it creates a fixed position canvas */
      body > canvas {
        display: none !important;
      }
      /* Only show canvas when it's inside our container */
      #root canvas {
        position: static !important;
        display: block !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
