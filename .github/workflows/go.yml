name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

    - name: Install SDL2
      run: |
        sudo apt-get update
        sudo apt-get install libsdl2-dev

    - name: Check out code into the Go module directory
      uses: actions/checkout@v7

    - name: Set up Go 1.x
      uses: actions/setup-go@v7
      with:
        go-version-file: go.mod
      id: go

    - name: Build
      run: go build -v .

    - name: Test
      run: go test -v ./...
